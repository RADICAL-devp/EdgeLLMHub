[tools]
java = "temurin-25.0.1+8.0.LTS"
node = "24.12.0"
deno = "2.5.6"

[env]
GRADLE_USER_HOME = "{{env.HOME}}/.gradle"

[plugins]


[shell_alias]
tasks = "mise tasks"
task = "mise run"
t = "mise run"


# ======================================================
# BEGIN: Code Tasks
# ------------------------------------------------------
[tasks."code:clean"]
description = "Clean Project and Build Cache"
run = "./gradlew clean && ./gradlew :list:clean && ./gradlew :utilities:clean && ./gradlew :app:clean && rm -rf build"

[tasks."code:build"]
description = "Build Code"
run = "./gradlew :list:build && ./gradlew :utilities:build && ./gradlew :app:build"

[tasks."code:release"]
description = "Clean and Build Code"
run = "mise run code:clean && mise run code:build"

[tasks."code:format"]
description = "Format Code"
run = "./gradlew :list:spotlessApply && ./gradlew :utilities:spotlessApply && ./gradlew :app:spotlessApply"
# ------------------------------------------------------
# END: Code Tasks
# ======================================================

# ======================================================
# BEGIN: Setup Tasks
# ------------------------------------------------------
[tasks."setup:dev-env"]
description = "Setup Dev Env"
run = "mise install"
# ------------------------------------------------------
# END: Setup Tasks
# ======================================================
